<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 70" role="img" aria-label="Glowfy logo network variant">
  <title>Glowfy</title>
  <defs>
    <radialGradient id="n3h-core" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </radialGradient>
  </defs>
  <!-- Icon centered at 35,35 (slightly scaled) -->
  <!-- Connection lines -->
  <line x1="35" y1="35" x2="16" y2="22" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="35" y1="35" x2="54" y2="22" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="35" y1="35" x2="16" y2="51" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="35" y1="35" x2="54" y2="51" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="16" y1="22" x2="54" y2="22" stroke="#2563eb" stroke-width="1" stroke-linecap="round" opacity="0.18"/>
  <!-- Outer nodes -->
  <circle cx="16" cy="22" r="6"   fill="#2563eb" opacity="0.45"/>
  <circle cx="54" cy="22" r="6"   fill="#2563eb" opacity="0.45"/>
  <circle cx="16" cy="51" r="4.5" fill="#2563eb" opacity="0.28"/>
  <circle cx="54" cy="51" r="4.5" fill="#2563eb" opacity="0.28"/>
  <!-- Ambient halo -->
  <circle cx="35" cy="35" r="18" fill="#2563eb" opacity="0.07"/>
  <!-- Central node -->
  <circle cx="35" cy="35" r="12" fill="url(#n3h-core)"/>
  <circle cx="31" cy="31" r="3.5" fill="white" opacity="0.4"/>
  <circle cx="31" cy="31" r="1.5" fill="white" opacity="0.65"/>
  <!-- Wordmark -->
  <text x="78" y="48"
        font-family="'Outfit', 'Urbanist', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="36" font-weight="300" letter-spacing="-1.5"
        fill="#1a1a24">glow<tspan fill="#2563eb" font-weight="500">fy</tspan></text>
</svg>
