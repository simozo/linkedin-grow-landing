<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 70 70" role="img" aria-label="Glowfy network icon">
  <title>Glowfy</title>
  <defs>
    <radialGradient id="n3-core" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </radialGradient>
  </defs>
  <!-- Connection lines from center to outer nodes -->
  <line x1="35" y1="35" x2="14" y2="20" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="35" y1="35" x2="56" y2="20" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="35" y1="35" x2="14" y2="53" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="35" y1="35" x2="56" y2="53" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <!-- Cross-link between top outer nodes (social graph feel) -->
  <line x1="14" y1="20" x2="56" y2="20" stroke="#2563eb" stroke-width="1" stroke-linecap="round" opacity="0.18"/>
  <!-- Outer nodes -->
  <circle cx="14" cy="20" r="7"   fill="#2563eb" opacity="0.45"/>
  <circle cx="56" cy="20" r="7"   fill="#2563eb" opacity="0.45"/>
  <circle cx="14" cy="53" r="5.5" fill="#2563eb" opacity="0.28"/>
  <circle cx="56" cy="53" r="5.5" fill="#2563eb" opacity="0.28"/>
  <!-- Ambient halo -->
  <circle cx="35" cy="35" r="20" fill="#2563eb" opacity="0.07"/>
  <!-- Central glow node -->
  <circle cx="35" cy="35" r="13" fill="url(#n3-core)"/>
  <!-- Glass highlight -->
  <circle cx="30" cy="30" r="4" fill="white" opacity="0.4"/>
  <circle cx="30" cy="30" r="1.8" fill="white" opacity="0.65"/>
</svg>
