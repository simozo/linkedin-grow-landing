<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" role="img" aria-label="Glowfy chevron flow icon dark">
  <title>Glowfy</title>
  <rect width="80" height="80" fill="#1a1a24"/>
  <!-- Stronger glow on dark -->
  <circle cx="55" cy="40" r="24" fill="#2563eb" opacity="0.15"/>
  <!-- Chevron 1 -->
  <polyline points="16,24 28,40 16,56"
            fill="none" stroke="#3b82f6" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"
            opacity="0.25"/>
  <!-- Chevron 2 -->
  <polyline points="29,24 41,40 29,56"
            fill="none" stroke="#3b82f6" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"
            opacity="0.58"/>
  <!-- Chevron 3 -->
  <polyline points="42,24 55,40 42,56"
            fill="none" stroke="#60a5fa" stroke-width="3.5"
            stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Glow node (more prominent on dark) -->
  <circle cx="55" cy="40" r="10" fill="#2563eb" opacity="0.25"/>
  <circle cx="55" cy="40" r="5"  fill="#3b82f6"/>
  <circle cx="55" cy="40" r="2.2" fill="#93c5fd"/>
</svg>
