<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" role="img" aria-label="Glowfy circuit G icon">
  <title>Glowfy</title>
  <!-- PCB circuit trace forming the letter G -->
  <!-- Path: open end (top-right) → top bar → left side → bottom bar → right side (half) → crossbar -->
  <path d="M60,17 L18,17 L18,63 L60,63 L60,42 L42,42"
        fill="none" stroke="#2563eb" stroke-width="4"
        stroke-linecap="square" stroke-linejoin="miter"/>
  <!-- Junction pads at each corner (5×5 squares) -->
  <rect x="57.5" y="14.5" width="5" height="5" rx="1" fill="#2563eb"/>
  <rect x="15.5" y="14.5" width="5" height="5" rx="1" fill="#2563eb"/>
  <rect x="15.5" y="60.5" width="5" height="5" rx="1" fill="#2563eb"/>
  <rect x="57.5" y="60.5" width="5" height="5" rx="1" fill="#2563eb"/>
  <rect x="57.5" y="39.5" width="5" height="5" rx="1" fill="#2563eb"/>
  <!-- Signal-end pad: highlighted with glow (crossbar tip = active endpoint) -->
  <rect x="39.5" y="39.5" width="5" height="5" rx="1" fill="#60a5fa"/>
  <circle cx="42" cy="42" r="3" fill="#93c5fd" opacity="0.6"/>
  <circle cx="42" cy="42" r="1.5" fill="white" opacity="0.9"/>
</svg>
