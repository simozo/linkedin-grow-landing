<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" role="img" aria-label="Glowfy circuit G icon dark">
  <title>Glowfy</title>
  <!-- Dark PCB substrate background -->
  <rect width="80" height="80" fill="#0d1526"/>
  <!-- Subtle PCB grid pattern -->
  <line x1="0" y1="20" x2="80" y2="20" stroke="#1e3a5f" stroke-width="0.5" opacity="0.5"/>
  <line x1="0" y1="40" x2="80" y2="40" stroke="#1e3a5f" stroke-width="0.5" opacity="0.5"/>
  <line x1="0" y1="60" x2="80" y2="60" stroke="#1e3a5f" stroke-width="0.5" opacity="0.5"/>
  <line x1="20" y1="0" x2="20" y2="80" stroke="#1e3a5f" stroke-width="0.5" opacity="0.5"/>
  <line x1="40" y1="0" x2="40" y2="80" stroke="#1e3a5f" stroke-width="0.5" opacity="0.5"/>
  <line x1="60" y1="0" x2="60" y2="80" stroke="#1e3a5f" stroke-width="0.5" opacity="0.5"/>
  <!-- Circuit G trace -->
  <path d="M60,17 L18,17 L18,63 L60,63 L60,42 L42,42"
        fill="none" stroke="#3b82f6" stroke-width="4"
        stroke-linecap="square" stroke-linejoin="miter"/>
  <!-- Junction pads -->
  <rect x="57.5" y="14.5" width="5" height="5" rx="1" fill="#3b82f6"/>
  <rect x="15.5" y="14.5" width="5" height="5" rx="1" fill="#3b82f6"/>
  <rect x="15.5" y="60.5" width="5" height="5" rx="1" fill="#3b82f6"/>
  <rect x="57.5" y="60.5" width="5" height="5" rx="1" fill="#3b82f6"/>
  <rect x="57.5" y="39.5" width="5" height="5" rx="1" fill="#3b82f6"/>
  <!-- Active endpoint with stronger glow on dark -->
  <rect x="39.5" y="39.5" width="5" height="5" rx="1" fill="#93c5fd"/>
  <circle cx="42" cy="42" r="5" fill="#60a5fa" opacity="0.3"/>
  <circle cx="42" cy="42" r="3" fill="#93c5fd" opacity="0.7"/>
  <circle cx="42" cy="42" r="1.5" fill="white" opacity="0.95"/>
</svg>
