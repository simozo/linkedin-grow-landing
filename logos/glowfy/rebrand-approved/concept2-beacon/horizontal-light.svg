<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 80" role="img" aria-label="Glowfy Personal Beacon logo - Horizontal Light">
  <title>Glowfy - Personal Beacon Concept</title>
  <defs>
    <linearGradient id="beacon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Icon Section -->
  <g transform="translate(15, 15)">
    <!-- Stylized G / Beacon -->
    <path d="M25 5 C15 5 5 15 5 25 C5 35 15 45 25 45 L40 45 L40 25 L25 25 L25 32 L33 32 L33 38 L25 38 C18 38 12 32 12 25 C12 18 18 12 25 12 C32 12 38 18 38 25" 
          fill="none" stroke="url(#beacon-grad)" stroke-width="4" stroke-linecap="round"/>
    
    <!-- The Beacon/Light Node -->
    <circle cx="45" cy="15" r="6" fill="#60a5fa" filter="url(#soft-glow)"/>
    <circle cx="45" cy="15" r="2" fill="#ffffff"/>
  </g>

  <!-- Typography -->
  <text x="85" y="52" 
        font-family="'Outfit', 'Urbanist', sans-serif" 
        font-size="36" font-weight="600" letter-spacing="-0.5" fill="#1a1a24">
    GLOW<tspan font-weight="300" fill="#2563eb">FY</tspan>
  </text>
</svg>
