<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Glowfy Personal Beacon logo - Icon Dark">
  <title>Glowfy - Icon</title>
  <rect width="120" height="120" fill="#1a1a24" rx="24"/>
  <defs>
    <linearGradient id="beacon-grad-icon-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
