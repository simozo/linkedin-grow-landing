<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 80" role="img" aria-label="Glowfy Organic Logic logo - Horizontal Light">
  <title>Glowfy - Organic Logic Concept</title>
  <defs>
    <linearGradient id="soft-tech-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="soft-glow-filter">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Icon Section: Rounded, interconnected "bubbles" or nodes -->
  <g transform="translate(10, 15)">
    <!-- Base Node -->
    <rect x="5" y="10" width="30" height="30" rx="12" fill="#2563eb" opacity="0.1"/>
    <rect x="15" y="20" width="30" height="30" rx="12" fill="#60a5fa" opacity="0.2"/>
    
    <!-- Central Soft Node -->
    <rect x="10" y="15" width="30" height="30" rx="15" fill="url(#soft-tech-grad)" filter="url(#soft-glow-filter)"/>
    <circle cx="25" cy="30" r="3" fill="#ffffff" opacity="0.8"/>
  </g>

  <!-- Typography: Stylized soft/tech rounded font -->
  <g transform="translate(85, 52)">
    <text font-family="'Comfortaa', 'Quicksand', -apple-system, sans-serif" 
          font-size="34" font-weight="600" letter-spacing="-0.5" fill="#1a1a24">
      glow<tspan fill="#2563eb">fy</tspan>
    </text>
  </g>
</svg>
