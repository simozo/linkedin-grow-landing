<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Glowfy Organic Logic logo - Icon Light">
  <title>Glowfy - Icon</title>
  <defs>
    <linearGradient id="soft-tech-grad-icon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="soft-glow-filter-icon">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <g transform="translate(30, 30)">
    <rect x="0" y="5" width="45" height="45" rx="18" fill="#2563eb" opacity="0.1"/>
    <rect x="15" y="20" width="45" height="45" rx="18" fill="#60a5fa" opacity="0.2"/>
    
    <rect x="7" y="12" width="45" height="45" rx="22" fill="url(#soft-tech-grad-icon)" filter="url(#soft-glow-filter-icon)"/>
    <circle cx="30" cy="35" r="5" fill="#ffffff" opacity="0.8"/>
  </g>
</svg>
