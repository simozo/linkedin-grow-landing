<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 80" role="img" aria-label="Glowfy Organic Logic logo - Horizontal Dark">
  <title>Glowfy - Organic Logic Concept</title>
  <rect width="250" height="80" fill="#1a1a24"/>
  <defs>
    <linearGradient id="soft-tech-grad-dark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
    <filter id="soft-glow-filter-dark">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <g transform="translate(10, 15)">
    <rect x="5" y="10" width="30" height="30" rx="12" fill="#ffffff" opacity="0.05"/>
    <rect x="15" y="20" width="30" height="30" rx="12" fill="#60a5fa" opacity="0.1"/>
    
    <rect x="10" y="15" width="30" height="30" rx="15" fill="url(#soft-tech-grad-dark)" filter="url(#soft-glow-filter-dark)"/>
    <circle cx="25" cy="30" r="3" fill="#ffffff"/>
  </g>

  <g transform="translate(85, 52)">
    <text font-family="'Comfortaa', 'Quicksand', -apple-system, sans-serif" 
          font-size="34" font-weight="600" letter-spacing="-0.5" fill="#fcfcfd">
      glow<tspan fill="#60a5fa">fy</tspan>
    </text>
  </g>
</svg>
