<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 80" role="img" aria-label="Glowfy Diamond Core logo - Horizontal Dark">
  <title>Glowfy - Diamond Core Concept</title>
  <rect width="250" height="80" fill="#1a1a24"/>
  <defs>
    <linearGradient id="diamond-grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <g transform="translate(15, 15)">
    <path d="M25 0 L50 25 L25 50 L0 25 Z" fill="url(#diamond-grad-dark)"/>
    <path d="M25 0 L25 50" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
    <path d="M0 25 L50 25" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
    <path d="M25 0 L12 25 L25 50 L38 25 Z" fill="#ffffff" opacity="0.15"/>
    
    <circle cx="25" cy="25" r="10" fill="#ffffff" opacity="0.2" filter="blur(4px)"/>
    <circle cx="25" cy="25" r="3" fill="#ffffff"/>
  </g>

  <g transform="translate(85, 52)">
    <text font-family="'Outfit', sans-serif" 
          font-size="30" font-weight="700" letter-spacing="1.5" fill="#fcfcfd">
      G<tspan fill="#60a5fa">L</tspan>OWFY
    </text>
  </g>
</svg>
