<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 80" role="img" aria-label="Glowfy Radiant Network logo - Horizontal Light">
  <title>Glowfy - Radiant Network Concept</title>
  <defs>
    <radialGradient id="node-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="1"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Icon Section -->
  <g transform="translate(15, 15)">
    <!-- Connection Lines -->
    <path d="M25 25 L45 5 M25 25 L45 45 M25 25 L5 25 M25 25 L50 25" stroke="#2563eb" stroke-width="1" opacity="0.3"/>
    
    <!-- Radiant Core -->
    <circle cx="25" cy="25" r="15" fill="url(#node-glow)" opacity="0.4"/>
    <circle cx="25" cy="25" r="6" fill="#2563eb"/>
    <circle cx="25" cy="25" r="2" fill="#ffffff"/>

    <!-- Peripheral Nodes -->
    <circle cx="45" cy="5" r="4" fill="#60a5fa" opacity="0.8"/>
    <circle cx="45" cy="45" r="4" fill="#60a5fa" opacity="0.8"/>
    <circle cx="5" cy="25" r="3" fill="#93c5fd"/>
    <circle cx="50" cy="25" r="2" fill="#2563eb"/>
  </g>

  <!-- Typography -->
  <text x="85" y="52" 
        font-family="'Outfit', 'Urbanist', sans-serif" 
        font-size="36" font-weight="300" letter-spacing="-1.2">
    glow<tspan font-weight="500" fill="#2563eb">fy</tspan>
  </text>
</svg>
