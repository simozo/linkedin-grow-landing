<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 80" role="img" aria-label="Glowfy Ethereal Orbit logo - Horizontal Light">
  <title>Glowfy - Ethereal Orbit Concept</title>
  <defs>
    <radialGradient id="orbit-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="1"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0.1"/>
    </radialGradient>
  </defs>

  <g transform="translate(10, 10)">
    <!-- Orbits -->
    <ellipse cx="30" cy="30" rx="28" ry="12" fill="none" stroke="#2563eb" stroke-width="1.5" opacity="0.15" transform="rotate(30, 30, 30)"/>
    <ellipse cx="30" cy="30" rx="28" ry="12" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.15" transform="rotate(-30, 30, 30)"/>
    
    <!-- Central Orb -->
    <circle cx="30" cy="30" r="14" fill="url(#orbit-grad)"/>
    <circle cx="30" cy="30" r="4" fill="#ffffff" opacity="0.9"/>
    
    <!-- Pulse ring -->
    <circle cx="30" cy="30" r="22" fill="none" stroke="#2563eb" stroke-width="0.5" opacity="0.3"/>
  </g>

  <g transform="translate(85, 52)">
    <text font-family="'Comfortaa', sans-serif" 
          font-size="36" font-weight="700" letter-spacing="-1" fill="#1a1a24">
      glow<tspan font-weight="400" fill="#2563eb">fy</tspan>
    </text>
  </g>
</svg>
