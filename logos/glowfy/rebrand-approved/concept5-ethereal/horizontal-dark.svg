<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 80" role="img" aria-label="Glowfy Ethereal Orbit logo - Horizontal Dark">
  <title>Glowfy - Ethereal Orbit Concept</title>
  <rect width="250" height="80" fill="#1a1a24"/>
  <defs>
    <radialGradient id="orbit-grad-dark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0.2"/>
    </radialGradient>
  </defs>

  <g transform="translate(10, 10)">
    <ellipse cx="30" cy="30" rx="28" ry="12" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.3" transform="rotate(30, 30, 30)"/>
    <ellipse cx="30" cy="30" rx="28" ry="12" fill="none" stroke="#93c5fd" stroke-width="2" opacity="0.3" transform="rotate(-30, 30, 30)"/>
    
    <circle cx="30" cy="30" r="15" fill="url(#orbit-grad-dark)" opacity="0.2"/>
    <circle cx="30" cy="30" r="6" fill="#60a5fa"/>
    <circle cx="30" cy="30" r="2" fill="#ffffff"/>
  </g>

  <g transform="translate(85, 52)">
    <text font-family="'Comfortaa', sans-serif" 
          font-size="36" font-weight="700" letter-spacing="-1" fill="#fcfcfd">
      glow<tspan font-weight="400" fill="#60a5fa">fy</tspan>
    </text>
  </g>
</svg>
