<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Glowfy Ethereal Orbit logo - Icon Light">
  <title>Glowfy - Icon</title>
  <defs>
    <radialGradient id="orbit-grad-icon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="1"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0.1"/>
    </radialGradient>
  </defs>

  <g transform="translate(30, 30)">
    <ellipse cx="30" cy="30" rx="28" ry="12" fill="none" stroke="#2563eb" stroke-width="2" opacity="0.15" transform="rotate(30, 30, 30)"/>
    <ellipse cx="30" cy="30" rx="28" ry="12" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.15" transform="rotate(-30, 30, 30)"/>
    
    <circle cx="30" cy="30" r="16" fill="url(#orbit-grad-icon)"/>
    <circle cx="30" cy="30" r="5" fill="#ffffff" opacity="0.9"/>
  </g>
</svg>
