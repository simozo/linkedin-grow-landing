<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 80" role="img" aria-label="Glowfy Friendly Pulse logo - Horizontal Dark">
  <title>Glowfy - Friendly Pulse Concept</title>
  <rect width="250" height="80" fill="#1a1a24"/>
  <defs>
    <linearGradient id="pulse-grad-dark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
  </defs>

  <g transform="translate(10, 20)">
    <path d="M5 25 Q15 5 25 25 T45 25" fill="none" stroke="#93c5fd" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
    <path d="M5 30 Q15 10 25 30 T45 30" fill="none" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>
    
    <circle cx="25" cy="20" r="12" fill="#ffffff" opacity="0.1"/>
    <circle cx="25" cy="20" r="7" fill="url(#pulse-grad-dark)"/>
    <circle cx="25" cy="20" r="2.5" fill="#ffffff"/>
  </g>

  <g transform="translate(85, 52)">
    <text font-family="'Comfortaa', sans-serif" 
          font-size="36" font-weight="700" letter-spacing="-1.5" fill="#fcfcfd">
      glow<tspan font-weight="300" fill="#60a5fa">fy</tspan>
    </text>
  </g>
</svg>
