<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Glowfy Glow Bloom logo - Icon Dark">
  <title>Glowfy - Icon</title>
  <rect width="120" height="120" fill="#1a1a24" rx="20"/>
  <defs>
    <radialGradient id="glow-grad-icon-dark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="petal-grad-icon-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <g transform="translate(30, 30)">
    <!-- Halo -->
    <circle cx="30" cy="30" r="28" fill="#60a5fa" opacity="0.15"/>
    
    <!-- Bloom Petals/Heart Shape -->
    <path d="M30 45 C20 45 10 35 10 25 C10 15 20 10 30 20 C40 10 50 15 50 25 C50 35 40 45 30 45 Z" 
          fill="url(#petal-grad-icon-dark)"/>
    
    <!-- Core Glow -->
    <circle cx="30" cy="27" r="10" fill="url(#glow-grad-icon-dark)" opacity="0.7"/>
    <circle cx="30" cy="27" r="3" fill="#ffffff"/>
  </g>
</svg>
