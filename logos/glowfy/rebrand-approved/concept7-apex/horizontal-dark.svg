<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 80" role="img" aria-label="Glowfy Apex Pillar logo - Horizontal Dark">
  <title>Glowfy - Apex Pillar Concept</title>
  <rect width="250" height="80" fill="#1a1a24"/>
  <defs>
    <linearGradient id="apex-grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <g transform="translate(15, 10)">
    <path d="M22 10 L42 50 L2 50 Z" fill="#ffffff" opacity="0.05"/>
    <path d="M20 5 L40 55 L0 55 Z" fill="url(#apex-grad-dark)"/>
    <path d="M20 20 L30 45 L10 45 Z" fill="#1a1a24" opacity="0.3"/>
    
    <circle cx="20" cy="5" r="10" fill="#ffffff" opacity="0.3" filter="blur(5px)"/>
    <circle cx="20" cy="5" r="3" fill="#ffffff"/>
  </g>

  <g transform="translate(85, 52)">
    <text font-family="'Outfit', serif" 
          font-size="32" font-weight="600" letter-spacing="2" fill="#fcfcfd" text-transform="uppercase">
      GLOW<tspan font-weight="300" fill="#60a5fa">FY</tspan>
    </text>
  </g>
</svg>
