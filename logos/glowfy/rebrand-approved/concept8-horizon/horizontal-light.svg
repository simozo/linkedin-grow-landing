<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 80" role="img" aria-label="Glowfy Strategic Horizon logo - Horizontal Light">
  <title>Glowfy - Strategic Horizon Concept</title>
  <defs>
    <linearGradient id="horizon-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e3a8a" stop-opacity="0"/>
      <stop offset="50%" stop-color="#2563eb" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Icon Section: Visionary line / Horizon -->
  <g transform="translate(15, 15)">
    <!-- Horizon Line -->
    <path d="M0 40 L50 40" stroke="url(#horizon-grad)" stroke-width="0.5" opacity="0.5"/>
    <path d="M5 40 L45 40" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- Rising Glow -->
    <path d="M10 40 Q25 5 40 40" fill="#2563eb" opacity="0.05"/>
    <path d="M15 40 Q25 15 35 40" fill="none" stroke="#2563eb" stroke-width="1" opacity="0.6"/>
    
    <!-- The Focal Point -->
    <circle cx="25" cy="28" r="10" fill="#60a5fa" opacity="0.1" filter="blur(3px)"/>
    <circle cx="25" cy="28" r="3" fill="#2563eb"/>
    <circle cx="25" cy="28" r="1" fill="#ffffff"/>
  </g>

  <!-- Typography: Ultra-minimalist, high-end -->
  <g transform="translate(85, 52)">
    <text font-family="'Outfit', sans-serif" 
          font-size="34" font-weight="200" letter-spacing="3" fill="#1a1a24">
      GLOW<tspan font-weight="600" fill="#2563eb">FY</tspan>
    </text>
  </g>
</svg>
