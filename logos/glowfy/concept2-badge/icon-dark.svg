<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" role="img" aria-label="Glowfy G badge icon dark">
  <title>Glowfy</title>
  <rect width="80" height="80" fill="#1a1a24"/>
  <defs>
    <linearGradient id="g2d-grad" x1="10%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- Badge -->
  <rect x="6" y="6" width="68" height="68" rx="20" fill="url(#g2d-grad)"/>
  <rect x="6" y="6" width="68" height="28" rx="20" fill="white" opacity="0.13"/>
  <!-- G lettermark -->
  <text x="40" y="57"
        font-family="'Outfit', 'Urbanist', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="44" font-weight="600" letter-spacing="-2"
        fill="white" text-anchor="middle">G</text>
  <!-- Sparkle dot -->
  <circle cx="60" cy="22" r="4.5" fill="white" opacity="0.35"/>
  <circle cx="60" cy="22" r="2"   fill="white" opacity="0.75"/>
</svg>
